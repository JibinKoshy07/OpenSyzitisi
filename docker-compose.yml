version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: opensyzitisi-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: opensyzitisi
    volumes:
      - mongodb_data:/data/db
    networks:
      - opensyzitisi-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opensyzitisi-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      FRONTEND_URL: http://localhost
      MONGODB_URI: mongodb://mongodb:27017/opensyzitisi
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: 7d
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: 52428800
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@opensyzitisi.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - opensyzitisi-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opensyzitisi-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
      NEXT_PUBLIC_WS_URL: http://localhost
    networks:
      - opensyzitisi-network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: opensyzitisi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - opensyzitisi-network
    depends_on:
      - backend
      - frontend

  mongo-express:
    image: mongo-express:latest
    container_name: opensyzitisi-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_MONGODB_SERVER: mongodb
    networks:
      - opensyzitisi-network
    depends_on:
      - mongodb
    profiles:
      - tools

networks:
  opensyzitisi-network:
    driver: bridge

volumes:
  mongodb_data:
  uploads_data:
